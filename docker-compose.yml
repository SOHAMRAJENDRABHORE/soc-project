services:

  # ── Central Server + Dashboard ────────────────────────────────────────────────
  server:
    build: .
    container_name: soc-server
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Store the DB on the named volume so it survives container restarts
      CENTRAL_DB_PATH: /data/central_server.db
      CENTRAL_SERVER_HOST: "0.0.0.0"
      CENTRAL_SERVER_PORT: "8080"
    volumes:
      - soc_data:/data          # SQLite DB
      - ./reports:/app/reports  # generated PDF reports (host-accessible)
    healthcheck:
      test: ["CMD", "curl", "-f", "-H",
             "Authorization: Bearer ${AGENT_AUTH_TOKEN}",
             "http://localhost:8080/agents"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Endpoint Agent ────────────────────────────────────────────────────────────
  agent:
    build: .
    container_name: soc-agent
    command: ["python", "-m", "endpoint_agent.agent"]
    env_file: .env
    environment:
      # Agent connects to server via the Docker internal network
      CENTRAL_SERVER_URL: http://server:8080
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  soc_data:
    driver: local
